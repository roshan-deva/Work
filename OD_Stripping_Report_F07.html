<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welspun Coating – OD Stripping Report</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1a5e 0%, #2d1b69 40%, #4a2c8a 100%); color: #fff; padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; }
  .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .header-left p { font-size: 13px; opacity: 0.8; margin-top: 3px; }
  .phone-toggle { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .phone-toggle:hover { background: rgba(255,255,255,0.25); }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .container.phone-mode { max-width: 420px; }

  .card { background: #fff; border-radius: 12px; padding: 28px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card-title { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #1a1a5e; margin-bottom: 4px; }
  .card-divider { height: 3px; background: linear-gradient(90deg, #00bcd4, #4a2c8a); border-radius: 2px; margin-bottom: 20px; }

  .form-grid { display: grid; gap: 16px; }
  .form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .form-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .phone-mode .form-grid.cols-3, .phone-mode .form-grid.cols-4 { grid-template-columns: 1fr; }

  .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #555; margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fafbfd; transition: border-color 0.2s; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #4a2c8a; background: #fff; }
  .field input::placeholder, .field textarea::placeholder { color: #aab; font-family: 'Courier New', monospace; font-size: 13px; }

  .section-label { font-size: 14px; font-weight: 700; color: #e91e63; margin-bottom: 12px; }

  .entry-grid { display: grid; gap: 12px; grid-template-columns: repeat(4, 1fr); }
  .entry-grid.cols-7 { grid-template-columns: 0.5fr 1fr 1fr 1fr 0.8fr 0.8fr 1.5fr; }
  .phone-mode .entry-grid.cols-7 { grid-template-columns: 1fr; }

  .remarks-select { appearance: auto; }

  /* Log Table */
  .log-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .log-header-left { display: flex; align-items: center; gap: 10px; }
  .badge { background: #4a4a5a; color: #fff; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .btn-csv { background: linear-gradient(135deg,#00AA6B,#007a4d); color: #fff; }
  .btn-csv:hover { background: #007a4d; }
  .btn-copy { background: #00bcd4; color: #fff; }
  .btn-copy:hover { background: #0097a7; }
  .btn-clear { background: #fff; color: #555; border: 1.5px solid #dde1e7; }
  .btn-clear:hover { background: #f5f5f5; }
  .btn-add { background: #00bcd4; color: #fff; font-size: 15px; padding: 12px 24px; }
  .btn-add:hover { background: #0097a7; }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  table.log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.log-table thead { background: linear-gradient(135deg, #1a1a5e, #4a2c8a); color: #fff; }
  table.log-table th { padding: 12px 10px; text-align: left; font-weight: 600; font-size: 12px; letter-spacing: 0.5px; }
  table.log-table td { padding: 10px; border-bottom: 1px solid #eee; }
  table.log-table tr:hover td { background: #f8f9ff; }
  .empty-msg { text-align: center; padding: 30px; color: #aab; font-size: 14px; }

  .delete-btn { background: none; border: none; color: #e53935; cursor: pointer; font-size: 16px; padding: 4px; }
  .delete-btn:hover { color: #b71c1c; }

  .footer-section { margin-top: 8px; }
  .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .phone-mode .footer-grid { grid-template-columns: 1fr; }

  @media print { .no-print { display: none !important; } body { background: #fff; } .card { box-shadow: none; border: 1px solid #ddd; } }
</style>
</head>

<div class="container" id="mainContainer">

  <!-- SHIFT INFO -->
  <div class="card">
    <div class="card-title">Shift Information</div>
    <div class="card-divider"></div>
    <div class="form-grid cols-3">
      <div class="field"><label>Project Name</label><input type="text" id="project" placeholder="e.g. Gulf Coast Pipeline"></div>
      <div class="field"><label>Date</label><input type="date" id="shiftDate"></div>
      <div class="field"><label>Shift</label>
        <select id="shift"><option value="">— Select Shift —</option><option>Day</option><option>Night</option></select>
      </div>
    </div>
    <div class="form-grid cols-3" style="margin-top:16px;">
      <div class="field"><label>Production Order #</label><input type="text" id="prodOrder" placeholder="PO-XXXXXX"></div>
      <div class="field"><label>Pipe Size</label><input type="text" id="pipeSize" placeholder='e.g. 42" OD x 0.625" WT'></div>
      <div class="field"><label>Coating Type</label><input type="text" id="coatingType" placeholder="e.g. FBE, 3LPE, ARO"></div>
    </div>
    <div class="form-grid cols-3" style="margin-top:16px;">
      <div class="field"><label>Page</label><input type="text" id="pageNum" placeholder="e.g. 1 of 3"></div>
      <div class="field"></div>
      <div class="field"></div>
    </div>
  </div>

  <!-- ADD ENTRY -->
  <div class="card no-print">
    <div class="card-title">Add Stripping Entry</div>
    <div class="card-divider"></div>
    <div class="section-label">PIPE DETAILS</div>
    <div class="form-grid cols-3">
      <div class="field"><label>Pipe Number *</label><input type="text" id="entryPipe" placeholder="e.g. P-001"></div>
      <div class="field"><label>Checksum</label><input type="text" id="entryChecksum" placeholder="e.g. 72654"></div>
      <div class="field"><label>Heat No.</label><input type="text" id="entryHeat" placeholder="e.g. A083900"></div>
    </div>
    <div class="form-grid cols-4" style="margin-top:16px;">
      <div class="field"><label>Length</label><input type="text" id="entryLength" placeholder="e.g. 78.150 FT"></div>
      <div class="field"><label>TPI No.</label><input type="text" id="entryTPI" placeholder="TPI-XXX"></div>
      <div class="field"><label>Remarks *</label>
        <select id="entryRemarks" class="remarks-select">
          <option value="">— Select —</option>
          <option>Good</option>
          <option>Restrip</option>
          <option>Back to Spiral</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field"><label>Inspector Name *</label><input type="text" id="entryInspector" placeholder="Full name"></div>
    </div>
    <div class="field" id="otherRemarksField" style="margin-top:16px; display:none;">
      <label>Other Remarks</label>
      <textarea id="entryOtherRemarks" rows="2" placeholder="Describe remarks"></textarea>
    </div>
    <div style="margin-top:20px;">
      <button class="btn btn-add" onclick="addEntry()">+ Add Entry</button>
    </div>
  </div>

  <!-- LOG TABLE -->
  <div class="card">
    <div class="log-header">
      <div class="log-header-left">
        <div class="card-title" style="margin-bottom:0">Stripping Log</div>
        <span class="badge" id="countBadge">0</span>
      </div>
      <div class="btn-group no-print">
        <button class="btn btn-csv" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="btn btn-copy" onclick="copyText()">📋 Copy as Text</button>
        <button class="btn btn-clear" onclick="newShift()">🗑 New Shift / Clear</button>
      </div>
    </div>
    <div class="card-divider"></div>
    <table class="log-table">
      <thead>
        <tr>
          <th>#</th><th>Pipe No.</th><th>Checksum</th><th>Heat No.</th><th>Length</th><th>TPI #</th><th>Remarks</th><th>Inspector</th><th class="no-print"></th>
        </tr>
      </thead>
      <tbody id="logBody">
        <tr><td colspan="9" class="empty-msg">No entries yet. Add the first stripping entry above.</td></tr>
      </tbody>
    </table>
  </div>

  <!-- FOOTER SIGNATURES -->
  <div class="card footer-section">
    <div class="card-title">Signatures</div>
    <div class="card-divider"></div>
    <div class="footer-grid">
      <div class="field"><label>QA/QC Name</label><input type="text" placeholder="Full name"></div>
      <div class="field"><label>Inspected By</label><input type="text" placeholder="Full name"></div>
    </div>
  </div>

</div>

<script>
  let entries = [];

  document.getElementById('shiftDate').valueAsDate = new Date();

  document.getElementById('entryRemarks').addEventListener('change', function() {
    document.getElementById('otherRemarksField').style.display = this.value === 'Other' ? 'block' : 'none';
  });

  function addEntry() {
    const pipe = document.getElementById('entryPipe').value.trim();
    const checksum = document.getElementById('entryChecksum').value.trim();
    const heat = document.getElementById('entryHeat').value.trim();
    const length = document.getElementById('entryLength').value.trim();
    const tpi = document.getElementById('entryTPI').value.trim();
    const remarks = document.getElementById('entryRemarks').value;
    const otherRemarks = document.getElementById('entryOtherRemarks').value.trim();
    const inspector = document.getElementById('entryInspector').value.trim();

    if (!pipe) { alert('Pipe Number is required.'); return; }
    if (!remarks) { alert('Remarks selection is required.'); return; }
    if (!inspector) { alert('Inspector Name is required.'); return; }

    const finalRemarks = remarks === 'Other' ? otherRemarks || 'Other' : remarks;

    entries.push({ pipe, checksum, heat, length, tpi, remarks: finalRemarks, inspector });
    renderTable();

    // Clear entry fields
    ['entryPipe','entryChecksum','entryHeat','entryLength','entryTPI','entryOtherRemarks','entryInspector'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('entryRemarks').value = '';
    document.getElementById('otherRemarksField').style.display = 'none';
  }

  function renderTable() {
    const tbody = document.getElementById('logBody');
    document.getElementById('countBadge').textContent = entries.length;
    if (entries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">No entries yet. Add the first stripping entry above.</td></tr>';
      return;
    }
    tbody.innerHTML = entries.map((e, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${e.pipe}</td>
        <td>${e.checksum}</td>
        <td>${e.heat}</td>
        <td>${e.length}</td>
        <td>${e.tpi}</td>
        <td>${e.remarks}</td>
        <td>${e.inspector}</td>
        <td class="no-print"><button class="delete-btn" onclick="deleteEntry(${i})" title="Delete">✕</button></td>
      </tr>
    `).join('');
  }

  function deleteEntry(idx) {
    if (confirm('Delete this entry?')) {
      entries.splice(idx, 1);
      renderTable();
    }
  }

  function exportCSV() {
    const project = document.getElementById('project').value;
    const date = document.getElementById('shiftDate').value;
    const shift = document.getElementById('shift').value;
    const q = s => ;

    csv += ;

    csv += '#,Pipe No.,Checksum,Heat No.,Length,TPI #,Remarks,Inspector
';
    if (entries.length === 0) { csv += 'No entries recorded.
'; }
    else entries.forEach((e,i) => {
      csv += ;
    });
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = ;
    a.click(); URL.revokeObjectURL(url);
    alert('CSV exported — opens in Excel!');
  }

  function copyText() {
    const project = document.getElementById('project').value;
    const date = document.getElementById('shiftDate').value;
    const shift = document.getElementById('shift').value;
    let text = `OD STRIPPING REPORT\nProject: ${project} | Date: ${date} | Shift: ${shift}\n\n`;
    text += '#\tPipe No.\tChecksum\tHeat No.\tLength\tTPI #\tRemarks\tInspector\n';
    entries.forEach((e, i) => {
      text += `${i+1}\t${e.pipe}\t${e.checksum}\t${e.heat}\t${e.length}\t${e.tpi}\t${e.remarks}\t${e.inspector}\n`;
    });
    navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => {
      const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('Copied to clipboard!');
    });
  }

  function newShift() {
    if (entries.length === 0 || confirm('Clear all entries and start a new shift?')) {
      entries = [];
      renderTable();
    }
  }

  function togglePhone() {
    document.getElementById('mainContainer').classList.toggle('phone-mode');
  }
</script>
